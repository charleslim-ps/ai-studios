name: Deploy to GitHub Pages

# Builds the Vite app and publishes app/dist to GitHub Pages.
# NOTE: GitHub Pages is PUBLIC — studios.json is world-readable. That's an
# accepted tradeoff for THIS launchpad; studios whose data is sensitive should
# host privately (Cloudflare Pages + Access) instead. See README → Hosting.
# Triggers on every push to main — INCLUDING the daily refresh.yml commits of
# studios.json — so fresh composer data reaches the page automatically. The
# refresh commit no longer uses [skip ci]; deploy.yml never commits, so there's
# no loop. Plus manual dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least-privilege perms required by the Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build app
        working-directory: app
        run: |
          npm ci
          npm run build

      # enablement: true turns Pages on via the API on the first run, so no
      # manual Settings → Pages step is needed (token has pages: write above).
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
