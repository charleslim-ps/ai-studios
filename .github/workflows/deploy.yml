name: Deploy to GitHub Pages

# Builds the Vite app and publishes app/dist to GitHub Pages.
# Triggers:
#   - push to main        → redeploy on any code change
#   - schedule (06:15 UTC) → 15 min after refresh.yml writes fresh studios.json,
#                            so the daily composer data actually reaches the page
#                            (refresh.yml commits with [skip ci], so it can't
#                            trigger this workflow itself)
#   - workflow_dispatch   → manual deploy from the Actions tab
on:
  push:
    branches: [main]
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch: {}

# Least-privilege perms required by the Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build app
        working-directory: app
        run: |
          npm ci
          npm run build

      # enablement: true turns Pages on via the API on the first run, so no
      # manual Settings → Pages step is needed (token has pages: write above).
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
